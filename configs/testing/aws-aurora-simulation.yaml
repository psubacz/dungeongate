# configs/testing/aws-aurora-simulation.yaml
# Simulated AWS Aurora configuration for testing
---
database:
  mode: "external"
  external:
    type: "postgresql"
    # Simulate Aurora endpoints (would be real AWS endpoints in production)
    writer_endpoint: "localhost:5432"  # Simulated writer
    reader_use_writer: false
    reader_endpoint: "localhost:5433"  # Simulated reader
    database: "dungeongate_aurora_test"
    username: "aurora_test_user"
    password: "${AURORA_DB_PASSWORD:-aurora_test_pass}"
    ssl_mode: "disable"  # Would be "require" in real Aurora
    max_connections: 50
    max_idle_conns: 10
    reader_max_connections: 30
    reader_max_idle_conns: 5
    conn_max_lifetime: "1h"
    migration_path: "./migrations"
    schema: "public"
    options:
      application_name: "dungeongate-aurora-test"
      connect_timeout: "10"
      statement_timeout: "30000"
    failover:
      enabled: true
      health_check_interval: "15s"
      failover_timeout: "5s"
      retry_interval: "3s"
      max_retries: 5
      reader_to_writer_fallback: true
  settings:
    log_queries: false  # Production-like
    timeout: "30s"
    retry_attempts: 3
    retry_delay: "2s"
    health_check: true
    health_interval: "15s"
    metrics_enabled: true

user_service:
  registration:
    enabled: true
    require_email: true
    require_terms: true
    email_verification: true
    manual_approval: false
    rate_limiting:
      enabled: true
      max_attempts: 3
      window: "1h"
      block_duration: "15m"
    email:
      verification_required: true
      domains_allowed: []
      domains_blocked: ["tempmail.org", "10minutemail.com"]
    captcha:
      enabled: true
      provider: "recaptcha"
      threshold: 0.7
  
  authentication:
    session_timeout: "4h"
    max_concurrent_sessions: 3
    two_factor_auth:
      enabled: false  # Disabled for testing
      required: false
    login_attempts:
      max_attempts: 5
      lock_duration: "15m"
      progressive: true
  
  validation:
    username:
      min_length: 3
      max_length: 20
      pattern: "^[a-zA-Z0-9_]+$"
      reserved: ["admin", "root", "test", "aurora", "aws"]
    password:
      min_length: 10
      max_length: 128
      require_special: true
      require_number: true
      require_uppercase: true
      require_lowercase: true
      forbidden: ["password", "test", "admin", "aurora", "1234567890"]
      min_entropy: 3.0
    email:
      required: true
      max_length: 80

session_service:
  server:
    port: 8083
    grpc_port: 9093
    host: "localhost"
  ssh:
    enabled: true
    port: 2222
    host: "localhost"
    host_key_path: "./test-data/ssh_keys/test_host_key"
    banner: "Welcome to DungeonGate Test Server (Aurora Simulation)!\r\n"
    max_sessions: 25
    session_timeout: "4h"
    idle_timeout: "30m"
    auth:
      password_auth: true
      public_key_auth: false
      allow_anonymous: false
  services:
    auth_service: "localhost:9090"
    user_service: "localhost:9091"
    game_service: "localhost:9092"
  storage:
    ttyrec_path: "./test-data/aurora/ttyrec"
    temp_path: "./test-data/aurora/tmp"
  logging:
    level: "info"  # Production-like
    format: "json"
    output: "./test-data/aurora/logs/session.log"
  security:
    rate_limiting:
      enabled: true
      max_connections_per_ip: 5
    brute_force_protection:
      enabled: true
      max_failed_attempts: 3
