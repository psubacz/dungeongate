# configs/testing/sqlite-embedded.yaml
# Basic SQLite embedded testing configuration
---
database:
  mode: "embedded"
  embedded:
    type: "sqlite"
    path: "./test-data/sqlite/users.db"
    migration_path: "./migrations"
    backup_enabled: false
    wal_mode: true
    cache:
      enabled: true
      size: 16
      ttl: "10m"
      type: "memory"
  settings:
    log_queries: true
    timeout: "30s"
    retry_attempts: 2
    retry_delay: "1s"
    health_check: false
    metrics_enabled: true

session_service:
  server:
    port: 8083
    grpc_port: 9093
    host: "localhost"
  ssh:
    enabled: true
    port: 2222
    host: "localhost"
    host_key_path: "./test-data/ssh_keys/test_host_key"
    banner: "Welcome to DungeonGate Test Server (SQLite)!\r\n"
    max_sessions: 5
  services:
    auth_service: "localhost:9090"
    user_service: "localhost:9091"
    game_service: "localhost:9092"
  storage:
    ttyrec_path: "./test-data/sqlite/ttyrec"
    temp_path: "./test-data/sqlite/tmp"
  logging:
    level: "debug"
    format: "text"
    output: "stdout"
