# configs/testing/postgresql-replica.yaml
# PostgreSQL with read replica testing
---
database:
  mode: "external"
  external:
    type: "postgresql"
    writer_endpoint: "localhost:5432"
    reader_use_writer: false
    reader_endpoint: "localhost:5433"  # Assume replica on different port
    database: "dungeongate_test"
    username: "dungeongate_test"
    password: "${DB_PASSWORD:-testpass123}"
    ssl_mode: "disable"
    max_connections: 20
    max_idle_conns: 5
    reader_max_connections: 15
    reader_max_idle_conns: 3
    conn_max_lifetime: "30m"
    migration_path: "./migrations"
    schema: "public"
    options:
      application_name: "dungeongate-test-replica"
      connect_timeout: "5"
    failover:
      enabled: true
      health_check_interval: "10s"
      failover_timeout: "5s"
      retry_interval: "2s"
      max_retries: 3
      reader_to_writer_fallback: true
  settings:
    log_queries: true
    timeout: "30s"
    retry_attempts: 3
    retry_delay: "1s"
    health_check: true
    health_interval: "10s"
    metrics_enabled: true

user_service:
  registration:
    enabled: true
    require_email: true
    require_terms: true
    email_verification: false  # Disabled for testing
    rate_limiting:
      enabled: true
      max_attempts: 5
      window: "10m"
    email:
      verification_required: false
      domains_blocked: ["tempmail.org"]
    captcha:
      enabled: false
  
  validation:
    username:
      min_length: 2
      max_length: 20
      pattern: "^[a-zA-Z0-9_]+$"
      reserved: ["admin", "root", "test", "postgres", "replica"]
    password:
      min_length: 8
      max_length: 128
      require_special: true
      require_number: true
      require_uppercase: false
      forbidden: ["password", "test", "admin", "12345678"]

session_service:
  server:
    port: 8083
    grpc_port: 9093
    host: "localhost"
  ssh:
    enabled: true
    port: 2222
    host: "localhost"
    host_key_path: "./test-data/ssh_keys/test_host_key"
    banner: "Welcome to DungeonGate Test Server (PostgreSQL Replica)!\r\n"
    max_sessions: 15
  services:
    auth_service: "localhost:9090"
    user_service: "localhost:9091"
    game_service: "localhost:9092"
  storage:
    ttyrec_path: "./test-data/postgresql-replica/ttyrec"
    temp_path: "./test-data/postgresql-replica/tmp"
  logging:
    level: "debug"
    format: "text"
    output: "stdout"
