# configs/testing/postgresql-single.yaml
# Single PostgreSQL instance testing
---
database:
  mode: "external"
  external:
    type: "postgresql"
    writer_endpoint: "localhost:5432"
    reader_use_writer: true  # Single instance mode
    database: "dungeongate_test"
    username: "dungeongate_test"
    password: "${DB_PASSWORD:-testpass123}"
    ssl_mode: "disable"  # For local testing
    max_connections: 20
    max_idle_conns: 5
    conn_max_lifetime: "30m"
    migration_path: "./migrations"
    schema: "public"
    options:
      application_name: "dungeongate-test"
      connect_timeout: "5"
    failover:
      enabled: false  # Single instance
  settings:
    log_queries: true
    timeout: "30s"
    retry_attempts: 3
    retry_delay: "1s"
    health_check: true
    health_interval: "15s"
    metrics_enabled: true

user_service:
  registration:
    enabled: true
    require_email: false
    require_terms: true
    email_verification: false
    rate_limiting:
      enabled: true
      max_attempts: 10
      window: "5m"
    captcha:
      enabled: false
  
  validation:
    username:
      min_length: 2
      max_length: 20
      pattern: "^[a-zA-Z0-9_]+$"
      reserved: ["admin", "root", "test", "postgres"]
    password:
      min_length: 6
      max_length: 128
      require_special: false
      require_number: false
      require_uppercase: false
      forbidden: ["password", "test", "admin"]

session_service:
  server:
    port: 8083
    grpc_port: 9093
    host: "localhost"
  ssh:
    enabled: true
    port: 2222
    host: "localhost"
    host_key_path: "./test-data/ssh_keys/test_host_key"
    banner: "Welcome to DungeonGate Test Server (PostgreSQL Single)!\r\n"
    max_sessions: 10
  services:
    auth_service: "localhost:9090"
    user_service: "localhost:9091"
    game_service: "localhost:9092"
  storage:
    ttyrec_path: "./test-data/postgresql/ttyrec"
    temp_path: "./test-data/postgresql/tmp"
  logging:
    level: "debug"
    format: "text"
    output: "stdout"
