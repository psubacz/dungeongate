# configs/testing/mysql-test.yaml
# MySQL testing configuration
---
database:
  mode: "external"
  external:
    type: "mysql"
    writer_endpoint: "localhost:3306"
    reader_use_writer: true
    database: "dungeongate_mysql_test"
    username: "dungeongate_mysql"
    password: "${MYSQL_PASSWORD:-mysql_test_pass}"
    ssl_mode: "false"  # MySQL uses true/false not require/disable
    max_connections: 25
    max_idle_conns: 5
    conn_max_lifetime: "30m"
    migration_path: "./migrations"
    options:
      parseTime: "true"
      charset: "utf8mb4"
      collation: "utf8mb4_unicode_ci"
    failover:
      enabled: false
  settings:
    log_queries: true
    timeout: "30s"
    retry_attempts: 3
    retry_delay: "1s"
    health_check: true
    health_interval: "20s"
    metrics_enabled: true

user_service:
  registration:
    enabled: true
    require_email: false
    require_terms: true
    email_verification: false
    rate_limiting:
      enabled: true
      max_attempts: 8
      window: "10m"
    captcha:
      enabled: false
  
  validation:
    username:
      min_length: 2
      max_length: 20
      pattern: "^[a-zA-Z0-9_]+$"
      reserved: ["admin", "root", "test", "mysql"]
    password:
      min_length: 6
      max_length: 128
      require_special: false
      require_number: false
      require_uppercase: false
      forbidden: ["password", "test", "admin", "mysql"]

session_service:
  server:
    port: 8083
    grpc_port: 9093
    host: "localhost"
  ssh:
    enabled: true
    port: 2222
    host: "localhost"
    host_key_path: "./test-data/ssh_keys/test_host_key"
    banner: "Welcome to DungeonGate Test Server (MySQL)!\r\n"
    max_sessions: 10
  services:
    auth_service: "localhost:9090"
    user_service: "localhost:9091"
    game_service: "localhost:9092"
  storage:
    ttyrec_path: "./test-data/mysql/ttyrec"
    temp_path: "./test-data/mysql/tmp"
  logging:
    level: "debug"
    format: "text"
    output: "stdout"
