# Pool-Based Architecture Monitoring Configuration
# This file provides monitoring dashboards and alerting rules for the pool-based session service

dashboards:
  pool_architecture:
    title: "DungeonGate Pool Architecture Dashboard"
    refresh: "5s"
    panels:
      - title: "Connection Pool Health"
        type: "graph"
        datasource: "prometheus"
        targets:
          - expr: "pool_connections_active"
            legendFormat: "Active Connections"
          - expr: "pool_connections_queued"
            legendFormat: "Queued Requests"
          - expr: "pool_connection_wait_time"
            legendFormat: "Average Wait Time (ms)"
          - expr: "(pool_connections_active / pool_connections_max) * 100"
            legendFormat: "Utilization %"
        yAxes:
          - label: "Count / Percentage"
          - label: "Wait Time (ms)"
            
      - title: "Worker Pool Performance"
        type: "graph"
        datasource: "prometheus"
        targets:
          - expr: "pool_workers_active"
            legendFormat: "Active Workers"
          - expr: "pool_workers_idle"
            legendFormat: "Idle Workers"
          - expr: "pool_task_queue_depth"
            legendFormat: "Queue Depth"
          - expr: "pool_task_processing_time"
            legendFormat: "Avg Processing Time (ms)"
        yAxes:
          - label: "Worker Count"
          - label: "Time (ms)"
            
      - title: "PTY Pool Status"
        type: "graph"
        datasource: "prometheus"
        targets:
          - expr: "pool_pty_allocated"
            legendFormat: "Allocated PTYs"
          - expr: "pool_pty_available"
            legendFormat: "Available PTYs"
          - expr: "pool_pty_allocation_time"
            legendFormat: "Allocation Time (ms)"
          - expr: "pool_pty_reuse_rate"
            legendFormat: "Reuse Rate %"
        yAxes:
          - label: "PTY Count / Percentage"
          - label: "Time (ms)"
            
      - title: "Backpressure and Load Management"
        type: "graph"
        datasource: "prometheus"
        targets:
          - expr: "pool_backpressure_active"
            legendFormat: "Backpressure Active"
          - expr: "pool_circuit_breaker_state"
            legendFormat: "Circuit Breaker State"
          - expr: "pool_load_shedding_events"
            legendFormat: "Load Shedding Events"
          - expr: "pool_resource_utilization"
            legendFormat: "Resource Utilization %"
        yAxes:
          - label: "State / Events"
          - label: "Utilization %"

      - title: "Performance Metrics"
        type: "singlestat"
        datasource: "prometheus"
        targets:
          - expr: "rate(session_connections_total[5m])"
            legendFormat: "Connections/sec"
          - expr: "histogram_quantile(0.95, rate(session_connection_duration_seconds_bucket[5m]))"
            legendFormat: "95th Percentile Connection Duration"
          - expr: "rate(session_handler_errors_total[5m])"
            legendFormat: "Errors/sec"

alerting:
  groups:
    - name: "pool_architecture_alerts"
      interval: "10s"
      rules:
        - alert: "ConnectionPoolNearCapacity"
          expr: "(pool_connections_active / pool_connections_max) > 0.90"
          for: "2m"
          labels:
            severity: "warning"
            component: "connection_pool"
          annotations:
            summary: "Connection pool utilization high"
            description: "Connection pool is at {{ $value }}% capacity. Consider scaling or investigating high load."
            
        - alert: "ConnectionPoolSaturated"
          expr: "(pool_connections_active / pool_connections_max) > 0.95"
          for: "1m"
          labels:
            severity: "critical"
            component: "connection_pool"
          annotations:
            summary: "Connection pool near saturation"
            description: "Connection pool is at {{ $value }}% capacity. Immediate action required."
            
        - alert: "WorkerPoolQueueSaturated"
          expr: "pool_task_queue_depth > 800"
          for: "1m"
          labels:
            severity: "critical"
            component: "worker_pool"
          annotations:
            summary: "Worker pool queue saturated"
            description: "Worker pool queue depth is {{ $value }}. System may be overloaded."
            
        - alert: "PTYPoolExhausted"
          expr: "pool_pty_available < 10"
          for: "30s"
          labels:
            severity: "critical"
            component: "pty_pool"
          annotations:
            summary: "PTY pool near exhaustion"
            description: "Only {{ $value }} PTYs available. May impact new sessions."
            
        - alert: "BackpressureActivated"
          expr: "pool_backpressure_active == 1"
          for: "5m"
          labels:
            severity: "warning"
            component: "backpressure"
          annotations:
            summary: "Backpressure mechanism activated"
            description: "Backpressure is active, indicating system load is high. Monitor for performance impact."
            
        - alert: "CircuitBreakerOpen"
          expr: "pool_circuit_breaker_state == 2"  # 0=closed, 1=half-open, 2=open
          for: "1m"
          labels:
            severity: "critical"
            component: "circuit_breaker"
          annotations:
            summary: "Circuit breaker is open"
            description: "Circuit breaker is open, blocking new requests. Check system health."
            
        - alert: "HighErrorRate"
          expr: "rate(session_handler_errors_total[5m]) > 10"
          for: "2m"
          labels:
            severity: "warning"
            component: "session_handler"
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }} errors/second. Investigate system issues."
            
        - alert: "SlowConnectionHandling"
          expr: "histogram_quantile(0.95, rate(session_connection_duration_seconds_bucket[5m])) > 5"
          for: "3m"
          labels:
            severity: "warning"
            component: "session_handler"
          annotations:
            summary: "Slow connection handling"
            description: "95th percentile connection duration is {{ $value }}s. Performance degradation detected."

# Metrics collection configuration
metrics:
  collection_interval: "10s"
  export_interval: "30s"
  retention_period: "24h"
  
  # Custom metrics for pool architecture
  custom_metrics:
    - name: "pool_connections_active"
      type: "gauge"
      help: "Number of active connections in the pool"
      labels: ["pool_type", "service"]
      
    - name: "pool_connections_max"
      type: "gauge"
      help: "Maximum number of connections allowed in the pool"
      labels: ["pool_type", "service"]
      
    - name: "pool_connection_wait_time"
      type: "histogram"
      help: "Time spent waiting for connection from pool"
      labels: ["pool_type", "priority"]
      buckets: [0.001, 0.005, 0.01, 0.05, 0.1, 0.5, 1.0, 2.0, 5.0]
      
    - name: "pool_workers_active"
      type: "gauge"
      help: "Number of active workers"
      labels: ["worker_type", "service"]
      
    - name: "pool_task_queue_depth"
      type: "gauge"
      help: "Number of tasks in worker queue"
      labels: ["worker_type", "service"]
      
    - name: "pool_pty_allocated"
      type: "gauge"
      help: "Number of allocated PTYs"
      labels: ["service"]
      
    - name: "pool_pty_available"
      type: "gauge"
      help: "Number of available PTYs"
      labels: ["service"]
      
    - name: "pool_backpressure_active"
      type: "gauge"
      help: "Whether backpressure is currently active (1=active, 0=inactive)"
      labels: ["service"]
      
    - name: "session_connections_total"
      type: "counter"
      help: "Total number of connections handled"
      labels: ["handler", "result"]

# Logging configuration for pool architecture
logging:
  structured: true
  level: "info"
  format: "json"
  
  # Log correlation for pool operations
  correlation:
    - field: "session_id"
      propagate: true
    - field: "connection_id"
      propagate: true
    - field: "user_id"
      propagate: true
    - field: "worker_id"
      propagate: true
      
  # Pool-specific log levels
  component_levels:
    connection_pool: "info"
    worker_pool: "info"
    pty_pool: "info"
    backpressure: "warn"
    session_handler: "info"
    
  # Performance logging thresholds
  performance_thresholds:
    connection_setup: "100ms"  # Log if connection setup > 100ms
    work_processing: "1s"      # Log if work processing > 1s
    pty_allocation: "50ms"     # Log if PTY allocation > 50ms

# Health check endpoints
health_checks:
  - name: "pool_health"
    path: "/pools/health"
    interval: "30s"
    timeout: "5s"
    checks:
      - name: "connection_pool_healthy"
        description: "Connection pool is accepting new connections"
      - name: "worker_pool_healthy"
        description: "Worker pool is processing tasks"
      - name: "pty_pool_healthy"
        description: "PTY pool can allocate new PTYs"
      - name: "backpressure_normal"
        description: "Backpressure is not active"
        
  - name: "pool_status"
    path: "/pools/status"
    interval: "10s"
    timeout: "3s"
    detailed: true