# ============================================================================
# DungeonGate Authentication Service Configuration
# ============================================================================
# This configuration file controls the centralized authentication service
# that handles user authentication, JWT token management, and authorization
# for all other services in the DungeonGate microservices architecture.
# ============================================================================

# Configuration file format version
version: "0.4.0"

# ============================================================================
# HTTP/gRPC Server Configuration
# ============================================================================
# Controls the auth service HTTP API and gRPC endpoints
server:
  # HTTP API server port (health checks, admin endpoints)
  port: 8081          
  
  # gRPC server port (authentication requests from other services)
  grpc_port: 8082     
  
  # Bind address (localhost for development, 0.0.0.0 for production)
  host: "localhost"
  
  # Request timeout for HTTP/gRPC operations
  timeout: "30s"
  
  # Maximum concurrent connections
  max_connections: 50

# ============================================================================
# Database Configuration
# ============================================================================
# Supports both embedded (SQLite) and external (PostgreSQL/MySQL) databases
# Auth service needs to store user credentials, sessions, and audit logs
database:
  # Database mode: "embedded" for SQLite, "external" for PostgreSQL/MySQL
  mode: "embedded"
  
  # Database type: sqlite, postgresql, mysql
  type: "sqlite"
  
  # Embedded Database Configuration (SQLite for development/small deployments)
  embedded:
    # Database engine type
    type: "sqlite"
    
    # Path to SQLite database file (shared with other services)
    path: "./data/sqlite/dungeongate-dev.db"
    
    # Directory containing database migration files
    migration_path: "./migrations"
    
    # Enable automatic database backups
    backup_enabled: false
    
    # SQLite Write-Ahead Logging mode (better concurrency for auth operations)
    wal_mode: true
    
    # Database caching configuration (important for auth performance)
    cache:
      # Enable query result caching for user lookups
      enabled: true
      
      # Cache size in MB (auth queries are typically small but frequent)
      size: 64
      
      # Time-to-live for cached entries
      ttl: "1h"
      
      # Cache type: memory, redis (redis recommended for multi-instance auth)
      type: "memory"
  
  # External Database Configuration (PostgreSQL/MySQL for production)
  external:
    # Database type for external mode
    type: "postgresql"
    
    # Writer database endpoint (primary/master database for auth writes)
    writer_endpoint: "localhost:5432"
    
    # Whether to use writer endpoint for read operations
    # Auth service should typically use writer for consistency
    reader_use_writer: true
    
    # Reader database endpoint (replica/slave, only used if reader_use_writer is false)
    reader_endpoint: "localhost:5432"
    
    # Database name to connect to
    database: "postgres"
    
    # Database username (should have auth table permissions)
    username: "postgres"
    
    # Database password (use environment variables in production)
    password: "mysecretpassword"
    
    # SSL mode: disable, require, verify-ca, verify-full
    # Should be "require" or higher for production auth service
    ssl_mode: "disable"
    
    # Maximum total database connections (auth service is typically high-traffic)
    max_connections: 25
    
    # Maximum idle connections in pool
    max_idle_conns: 10
    
    # Maximum lifetime for database connections
    conn_max_lifetime: "1h"
    
    # Maximum connections for read operations
    reader_max_connections: 15
    
    # Maximum idle connections for readers
    reader_max_idle_conns: 5
    
    # Path to database migration files
    migration_path: "./migrations"
    
    # Database schema name
    schema: "public"
    
    # Database failover configuration (critical for auth service)
    failover:
      # Enable automatic failover on connection issues
      enabled: true
      
      # How often to check database health
      health_check_interval: "30s"
      
      # Timeout before triggering failover
      failover_timeout: "10s"
      
      # Retry interval for failed connections
      retry_interval: "5s"
      
      # Maximum retry attempts before giving up
      max_retries: 3
      
      # Fall back to writer if reader fails
      reader_to_writer_fallback: true
  
  # Common database settings
  settings:
    # Log all SQL queries (disable in production for security)
    log_queries: true
    
    # Database operation timeout (short for auth responsiveness)
    timeout: "30s"
    
    # Number of retry attempts for failed operations
    retry_attempts: 3
    
    # Delay between retry attempts
    retry_delay: "1s"
  
  # Legacy pool configuration (for backward compatibility)
  pool:
    max_connections: 10
    max_idle_connections: 5
    connection_max_lifetime: "1h"

# ============================================================================
# Authentication Configuration
# ============================================================================
# Core authentication settings including JWT and security policies
auth:
  # Enable authentication service (should always be true for auth service)
  enabled: true
  
  # JWT secret for signing tokens (CRITICAL: change in production)
  # Should be a long, random string. Same across all services for token validation.
  jwt_secret: "dev-secret-please-change-in-production"
  
  # JWT issuer name (identifies this auth service)
  jwt_issuer: "dungeongate-dev"
  
  # How long access tokens are valid (short for security)
  access_token_expiration: "15m"
  
  # How long refresh tokens are valid (longer for user convenience)
  refresh_token_expiration: "168h"  # 7 days
  
  # Maximum failed login attempts before account lockout
  max_login_attempts: 3
  
  # How long to lock out users after max failed attempts
  lockout_duration: "15m"
  
  # Require JWT tokens for API access (should be true in production)
  require_token_for_api: false
  
  # Require JWT tokens for SSH access (should be true in production)
  require_token_for_ssh: false

# ============================================================================
# Encryption Configuration
# ============================================================================
# Controls encryption for sensitive data like passwords and tokens
encryption:
  # Enable encryption (should be true for auth service)
  enabled: true
  
  # Encryption algorithm for sensitive data
  algorithm: "AES-256-GCM"
  
  # How often to rotate encryption keys (important for security)
  key_rotation_interval: "24h"

# ============================================================================
# Logging Configuration
# ============================================================================
# Auth service logging (important for security auditing)
logging:
  # Log level: debug (dev), info (prod), warn, error
  # Use "info" or "warn" in production to avoid logging sensitive data
  level: "debug"
  
  # Log format: text (dev), json (prod for log aggregation)
  format: "text"
  
  # Log output: stdout, stderr, or file path
  # Consider centralized logging for production auth service
  output: "stdout"

# ============================================================================
# Health Check Configuration
# ============================================================================
# Health monitoring for the auth service (critical service)
health:
  # Enable health check endpoint
  enabled: true
  
  # Health check endpoint path
  path: "/health"

# ============================================================================
# Security Configuration
# ============================================================================
# Security features for the auth service (most critical service)
security:
  # Rate limiting configuration (essential for auth service)
  rate_limiting:
    # Enable rate limiting (should be true in production)
    enabled: false
    
    # Maximum connections per IP address (prevent brute force)
    max_connections_per_ip: 100
    
    # Time window for connection counting
    connection_window: "1m"
    
  # Brute force protection (critical for auth service)
  brute_force_protection:
    # Enable brute force protection (should be true in production)
    enabled: false
    
    # Maximum failed attempts before blocking IP
    max_failed_attempts: 10
    
    # How long to block IP after max attempts
    lockout_duration: "1m"
    
  # Session security settings
  session_security:
    # Require encryption for session data (should be true)
    require_encryption: true
    
    # Length of session tokens (longer = more secure)
    session_token_length: 32
    
    # Use cryptographically secure random for tokens
    secure_random: true