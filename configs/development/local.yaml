# Development Configuration for DungeonGate Session Service
version: "0.0.3"

server:
  port: 8083
  grpc_port: 9093
  host: "localhost"
  timeout: "30s"
  max_connections: 100

ssh:
  enabled: true
  port: 2222
  host: "localhost"
  host_key_path: "/Users/caboose/dungeongate/./test-data/ssh_keys/test_host_key"
  banner: "Welcome to DungeonGate Development Server!\r\n"
  max_sessions: 10
  session_timeout: "1h"
  idle_timeout: "15m"
  
  auth:
    password_auth: true
    public_key_auth: false
    allow_anonymous: true
    
  terminal:
    default_size: "80x24"
    max_size: "120x40"
    supported_terminals: ["xterm", "xterm-256color", "screen", "tmux"]

session_management:
  terminal:
    default_size: "80x24"
    max_size: "120x40"
    encoding: "utf-8"
    
  timeouts:
    idle_timeout: "15m"
    max_session_duration: "1h"
    cleanup_interval: "1m"
    
  ttyrec:
    enabled: true
    compression: "gzip"
    directory: "/Users/caboose/Desktop/dungeongate/ttyrec"
    max_file_size: "10MB"
    retention_days: 7
    
  spectating:
    enabled: true
    max_spectators_per_session: 3
    spectator_timeout: "30m"

database:
  # Switch between "embedded" for SQLite or "external" for PostgreSQL
  mode: "embedded"  # Change to "external" to use PostgreSQL
  type: "sqlite"    # sqlite for embedded mode, postgresql for external mode
  
  # Embedded database configuration (SQLite)
  embedded:
    type: "sqlite"
    path: "./data/sqlite/dungeongate-dev.db"
    migration_path: "./migrations"
    backup_enabled: false
    wal_mode: true
    cache:
      enabled: true
      size: 64
      ttl: "1h"
      type: "memory"
  
  # External database configuration (PostgreSQL)
  external:
    type: "postgresql"
    writer_endpoint: "localhost:5432"
    reader_use_writer: true  # Use same endpoint for both read and write
    reader_endpoint: "localhost:5432"  # Same as writer since reader_use_writer is true
    database: "postgres"
    username: "postgres"
    password: "mysecretpassword"
    ssl_mode: "disable"
    max_connections: 25
    max_idle_conns: 10
    conn_max_lifetime: "1h"
    reader_max_connections: 15
    reader_max_idle_conns: 5
    migration_path: "./migrations"
    schema: "public"
    failover:
      enabled: true
      health_check_interval: "30s"
      failover_timeout: "10s"
      retry_interval: "5s"
      max_retries: 3
      reader_to_writer_fallback: true
  
  # Common settings
  settings:
    log_queries: true
    timeout: "30s"
    retry_attempts: 3
    retry_delay: "1s"
  
  # Legacy pool config for compatibility
  pool:
    max_connections: 10
    max_idle_connections: 5
    connection_max_lifetime: "1h"

# Menu and banner configuration
menu:
  banners:
    main_anon: "./configs/development/banners/main_anon.txt"
    main_user: "./configs/development/banners/main_user.txt"
    watch_menu: "./configs/development/banners/watch_menu.txt"
  options:
    anonymous:
      - key: "l"
        label: "Login"
        action: "login"
      - key: "r"
        label: "Register"
        action: "register"
      - key: "w"
        label: "Watch games"
        action: "watch"
      - key: "g"
        label: "List games"
        action: "list_games"
      - key: "q"
        label: "Quit"
        action: "quit"
    authenticated:
      - key: "p"
        label: "Play a game"
        action: "play"
      - key: "w"
        label: "Watch games"
        action: "watch"
      - key: "e"
        label: "Edit profile"
        action: "edit_profile"
      - key: "l"
        label: "List games"
        action: "list_games"
      - key: "r"
        label: "View recordings"
        action: "recordings"
      - key: "s"
        label: "Statistics"
        action: "stats"
      - key: "x"
        label: "Reset NetHack save"
        action: "reset_save"
      - key: "q"
        label: "Quit"
        action: "quit"

encryption:
  enabled: false  # Disabled for development
  algorithm: "AES-256-GCM"
  key_rotation_interval: "24h"

services:
  auth_service: "localhost:9090"
  user_service: "localhost:9091"
  game_service: "localhost:9092"

storage:
  ttyrec_path: "/Users/caboose/Desktop/dungeongate/ttyrec"
  temp_path: "/Users/caboose/Desktop/dungeongate/tmp"

logging:
  level: "debug"
  format: "text"
  output: "stdout"

metrics:
  enabled: true
  port: 8085

health:
  enabled: true
  path: "/health"

security:
  rate_limiting:
    enabled: false  # Disabled for development
    max_connections_per_ip: 100
    connection_window: "1m"
    
  brute_force_protection:
    enabled: false  # Disabled for development
    max_failed_attempts: 10
    lockout_duration: "1m"
    
  session_security:
    require_encryption: false
    session_token_length: 32
    secure_random: true

# Game configurations
games:
  - id: "nethack"
    name: "NetHack"
    short_name: "nh"
    version: "3.7.0"
    enabled: true
    binary:
      path: "/usr/games/nethack"
      args: ["-u", "${USERNAME}"]
      working_directory: "/var/games/nethack"
      user: "games"
      group: "games"
      permissions: "0755"
    files:
      data_directory: "/var/games/nethack"
      save_directory: "/var/games/nethack/save"
      config_directory: "/var/games/nethack/config"
      log_directory: "/var/log/nethack"
      temp_directory: "/tmp/nethack"
      shared_files: ["nhdat", "license", "recover"]
      user_files: ["${USERNAME}.nh", "${USERNAME}.0", "${USERNAME}.bak"]
      permissions:
        data_directory: "0755"
        save_directory: "0755"
        user_files: "0644"
        log_files: "0644"
    settings:
      max_players: 50
      max_session_duration: "4h"
      idle_timeout: "30m"
      save_interval: "5m"
      auto_save: true
      spectating:
        enabled: true
        max_spectators_per_session: 5
        spectator_timeout: "2h"
      recording:
        enabled: true
        format: "ttyrec"
        compression: "gzip"
        max_file_size: "100MB"
        retention_days: 30
        auto_cleanup: true
      options:
        MAXNROFPLAYERS: "50"
        SEDLEVEL: "5"
        DUMPLOG: "1"
        LIVELOG: "1"
        XLOGFILE: "/var/games/nethack/xlogfile"
        LIVELOGFILE: "/var/games/nethack/livelog"
    environment:
      NETHACKOPTIONS: "@/var/games/nethack/config/${USERNAME}.nethackrc"
      HACKDIR: "/var/games/nethack"
      TERM: "xterm-256color"
      USER: "${USERNAME}"
      HOME: "/var/games/nethack/users/${USERNAME}"
      SHELL: "/bin/sh"
    resources:
      cpu_limit: "500m"
      memory_limit: "256Mi"
      cpu_request: "100m"
      memory_request: "64Mi"
      disk_limit: "1Gi"
      pids_limit: 50
    container:
      image: "dungeongate/nethack"
      tag: "3.7.0"
      registry: "ghcr.io"
      pull_policy: "IfNotPresent"
      volumes:
        - name: "nethack-data"
          host_path: "/var/games/nethack"
          mount_path: "/var/games/nethack"
          read_only: false
        - name: "nethack-saves"
          host_path: "/var/games/nethack/save"
          mount_path: "/var/games/nethack/save"
          read_only: false
      environment:
        GAME: "nethack"
        USERNAME: "${USERNAME}"
        TERM: "xterm-256color"
      security_context:
        run_as_user: 1000
        run_as_group: 1000
        read_only_root_filesystem: true
        privileged: false
      network_mode: "none"
    networking:
      mode: "isolated"
