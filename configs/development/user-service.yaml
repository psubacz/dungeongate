# ============================================================================
# DungeonGate User Service Configuration
# ============================================================================
# This configuration file controls the user management service that handles
# user registration, profile management, validation rules, and user-related
# operations for the DungeonGate platform.
# ============================================================================

# Configuration file format version
version: "0.4.0"

# ============================================================================
# HTTP/gRPC Server Configuration
# ============================================================================
# Controls the user service HTTP API and gRPC endpoints
server:
  # HTTP API server port (REST endpoints for user management)
  port: 8084          
  
  # gRPC server port (user requests from other services)
  grpc_port: 9084     
  
  # Bind address (localhost for development, 0.0.0.0 for production)
  host: "localhost"
  
  # Request timeout for HTTP/gRPC operations
  timeout: "30s"
  
  # Maximum concurrent connections
  max_connections: 50

# ============================================================================
# Database Configuration
# ============================================================================
# User service database for storing user profiles, preferences, and metadata
database:
  # Database mode: "embedded" for SQLite, "external" for PostgreSQL/MySQL
  mode: "embedded"
  
  # Database type: sqlite, postgresql, mysql
  type: "sqlite"
  
  # Embedded Database Configuration (SQLite for development/small deployments)
  embedded:
    # Database engine type
    type: "sqlite"
    
    # Path to SQLite database file (shared with other services)
    path: "./data/sqlite/dungeongate-dev.db"
    
    # Directory containing database migration files
    migration_path: "./migrations"
    
    # Enable automatic database backups
    backup_enabled: false
    
    # SQLite Write-Ahead Logging mode (better concurrency)
    wal_mode: true
    
    # Database caching configuration (important for user lookups)
    cache:
      # Enable query result caching for user data
      enabled: true
      
      # Cache size in MB
      size: 64
      
      # Time-to-live for cached entries
      ttl: "1h"
      
      # Cache type: memory, redis
      type: "memory"
  
  # External Database Configuration (PostgreSQL/MySQL for production)
  external:
    # Database type for external mode
    type: "postgresql"
    
    # Writer database endpoint (primary/master database)
    writer_endpoint: "localhost:5432"
    
    # Whether to use writer endpoint for read operations
    reader_use_writer: true
    
    # Reader database endpoint (replica/slave, only used if reader_use_writer is false)
    reader_endpoint: "localhost:5432"
    
    # Database name to connect to
    database: "postgres"
    
    # Database username
    username: "postgres"
    
    # Database password (use environment variables in production)
    password: "mysecretpassword"
    
    # SSL mode: disable, require, verify-ca, verify-full
    ssl_mode: "disable"
    
    # Maximum total database connections
    max_connections: 25
    
    # Maximum idle connections in pool
    max_idle_conns: 10
    
    # Maximum lifetime for database connections
    conn_max_lifetime: "1h"
    
    # Maximum connections for read operations
    reader_max_connections: 15
    
    # Maximum idle connections for readers
    reader_max_idle_conns: 5
    
    # Path to database migration files
    migration_path: "./migrations"
    
    # Database schema name
    schema: "public"
    
    # Database failover configuration
    failover:
      # Enable automatic failover on connection issues
      enabled: true
      
      # How often to check database health
      health_check_interval: "30s"
      
      # Timeout before triggering failover
      failover_timeout: "10s"
      
      # Retry interval for failed connections
      retry_interval: "5s"
      
      # Maximum retry attempts before giving up
      max_retries: 3
      
      # Fall back to writer if reader fails
      reader_to_writer_fallback: true
  
  # Common database settings
  settings:
    # Log all SQL queries (useful for debugging)
    log_queries: true
    
    # Database operation timeout
    timeout: "30s"
    
    # Number of retry attempts for failed operations
    retry_attempts: 3
    
    # Delay between retry attempts
    retry_delay: "1s"
  
  # Legacy pool configuration (for backward compatibility)
  pool:
    max_connections: 10
    max_idle_connections: 5
    connection_max_lifetime: "1h"

# ============================================================================
# User Registration Configuration
# ============================================================================
# Controls how new users can register and what information is required
registration:
  # Enable user registration (set to false to disable new signups)
  enabled: true
  
  # Require email address during registration
  require_email: false
  
  # Require acceptance of terms of service
  require_terms: true
  
  # Require email verification before account activation
  email_verification: false
  
  # Require manual approval by administrators
  manual_approval: false
  
  # Default roles assigned to new users
  default_roles: ["user"]
  
  # Rate limiting for registration attempts
  rate_limiting:
    # Enable rate limiting for registration
    enabled: true
    
    # Maximum registration attempts per time window
    max_attempts: 5
    
    # Time window for counting attempts
    window: "1h"
    
    # Duration to block after exceeding max attempts
    block_duration: "15m"
    
  # Email configuration for registration
  email:
    # Require email verification (overrides email_verification above)
    verification_required: false
    
    # List of allowed email domains (empty = allow all)
    domains_allowed: []
    
    # List of blocked email domains
    domains_blocked: []
    
  # CAPTCHA configuration for registration
  captcha:
    # Enable CAPTCHA verification
    enabled: false
    
    # CAPTCHA provider: recaptcha, hcaptcha
    provider: "recaptcha"
    
    # Minimum score threshold (for reCAPTCHA v3)
    threshold: 0.5

# ============================================================================
# Authentication Configuration
# ============================================================================
# User authentication settings and password policies
authentication:
  # Password expiration policy ("0" = never expire)
  password_expiry: "0"
  
  # Session timeout for authenticated users
  session_timeout: "24h"
  
  # Maximum concurrent sessions per user
  max_concurrent_sessions: 5
  
  # Require password change on first login
  require_password_change: false
  
  # Two-factor authentication configuration
  two_factor_auth:
    # Enable 2FA support
    enabled: false
    
    # Require 2FA for all users
    required: false
    
    # Supported 2FA methods
    methods: ["totp"]
    
    # Issuer name for TOTP apps
    issuer: "DungeonGate"
    
  # Login attempt tracking and lockout
  login_attempts:
    # Maximum failed login attempts before lockout
    max_attempts: 3
    
    # Duration of account lockout
    lock_duration: "15m"
    
    # Time window for counting failed attempts
    reset_window: "1h"
    
    # Progressive lockout (increase duration with repeated failures)
    progressive: true

# ============================================================================
# Validation Configuration
# ============================================================================
# Rules for validating user input during registration and profile updates
validation:
  # Username validation rules
  username:
    # Minimum username length
    min_length: 2
    
    # Maximum username length
    max_length: 20
    
    # Regular expression pattern for valid usernames
    pattern: "^[a-zA-Z0-9_]+$"
    
    # Reserved usernames that cannot be used
    reserved: ["admin", "root", "guest", "anonymous", "system"]
    
    # Blacklisted usernames (offensive, etc.)
    blacklist: []
    
  # Password validation rules
  password:
    # Minimum password length
    min_length: 6
    
    # Maximum password length
    max_length: 128
    
    # Require special characters (!@#$%^&*)
    require_special: false
    
    # Require at least one number
    require_number: false
    
    # Require at least one uppercase letter
    require_uppercase: false
    
    # Require at least one lowercase letter
    require_lowercase: false
    
    # List of forbidden passwords
    forbidden: ["password", "123456", "admin", "guest"]
    
    # Minimum entropy score (0.0 = no requirement)
    min_entropy: 0.0
    
  # Email validation rules
  email:
    # Require email address (overrides registration.require_email)
    required: false
    
    # Maximum email address length
    max_length: 80
    
    # List of allowed email domains (empty = allow all)
    domains_allowed: []
    
    # List of blocked email domains
    domains_blocked: []

# ============================================================================
# Encryption Configuration
# ============================================================================
# Encryption settings for user data protection
encryption:
  # Enable encryption for sensitive user data
  enabled: true
  
  # Encryption algorithm for user data
  algorithm: "AES-256-GCM"
  
  # How often to rotate encryption keys
  key_rotation_interval: "24h"

# ============================================================================
# Logging Configuration
# ============================================================================
# User service logging for debugging and audit trails
logging:
  # Log level: debug, info, warn, error
  level: "debug"
  
  # Log format: text, json
  format: "text"
  
  # Log output: stdout, stderr, or file path
  output: "stdout"

# ============================================================================
# Health Check Configuration
# ============================================================================
# Health monitoring for the user service
health:
  # Enable health check endpoint
  enabled: true
  
  # Health check endpoint path
  path: "/health"

# ============================================================================
# Security Configuration
# ============================================================================
# Security features specific to user management
security:
  # Rate limiting configuration
  rate_limiting:
    # Enable rate limiting
    enabled: true
    
    # Maximum connections per IP address
    max_connections_per_ip: 10
    
    # Time window for connection counting
    connection_window: "1m"
    
  # Brute force protection
  brute_force_protection:
    # Enable brute force protection
    enabled: true
    
    # Maximum failed attempts before blocking
    max_failed_attempts: 5
    
    # How long to block after max attempts
    lockout_duration: "15m"
    
  # Session security settings
  session_security:
    # Require encryption for session data
    require_encryption: true
    
    # Length of session tokens
    session_token_length: 32
    
    # Use cryptographically secure random for tokens
    secure_random: true