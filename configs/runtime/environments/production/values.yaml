# Production Environment Configuration
production:
  # Global settings
  global:
    namespace: "dungeongate"
    domain: "dungeongate.example.com"
    debug: false
    log_level: "info"
    
  # Database settings
  database:
    type: "postgresql"
    host: "postgres-primary.database.svc.cluster.local"
    port: 5432
    ssl_mode: "require"
    auto_migrate: false
    
  # Redis settings
  redis:
    enabled: true
    host: "redis-primary.cache.svc.cluster.local"
    port: 6379
    sentinel: true
    
  # Service replicas
  replicas:
    user_service: 3
    game_service: 5
    session_service: 3
    
  # Resource limits
  resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"
        
    user_service:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"
        
    game_service:
      limits:
        cpu: "2000m"
        memory: "2Gi"
      requests:
        cpu: "1000m"
        memory: "1Gi"
        
    session_service:
      limits:
        cpu: "1500m"
        memory: "1.5Gi"
      requests:
        cpu: "750m"
        memory: "768Mi"
        
  # Storage
  storage:
    enabled: true
    size: "1Ti"
    storage_class: "ssd"
    
  # Monitoring
  monitoring:
    enabled: true
    prometheus: true
    grafana: true
    alertmanager: true
    
  # Security
  security:
    tls_enabled: true
    network_policies: true
    pod_security_policies: true
    
  # High availability
  ha:
    enabled: true
    pod_disruption_budget: true
    anti_affinity: true
    
  # Backup
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retention: "30d"
    
  # Auto-scaling
  autoscaling:
    enabled: true
    min_replicas: 2
    max_replicas: 10
    target_cpu: 70
    target_memory: 80
    
  # Feature flags
  features:
    registration: true
    ssh_access: true
    web_interface: true
    api_access: true
    ttyrec_recording: true
    game_spectating: true
    
  # Performance tuning
  performance:
    connection_pooling: true
    caching: true
    compression: true
    cdn: true
