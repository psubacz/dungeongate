# Development Environment Configuration
development:
  # Global settings
  global:
    namespace: "dungeongate-dev"
    domain: "dungeongate.local"
    debug: true
    log_level: "debug"
    
  # Database settings
  database:
    type: "sqlite"
    path: "/data/dungeongate-dev.db"
    auto_migrate: true
    
  # Redis settings (optional in dev)
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    
  # Service replicas
  replicas:
    auth_service: 1
    user_service: 1
    game_service: 1
    session_service: 1
    
  # Resource limits
  resources:
    auth_service:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
        
    user_service:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
        
    game_service:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "200m"
        memory: "256Mi"
        
    session_service:
      limits:
        cpu: "300m"
        memory: "384Mi"
      requests:
        cpu: "150m"
        memory: "192Mi"
        
  # Storage
  storage:
    enabled: true
    size: "10Gi"
    storage_class: "standard"
    
  # Monitoring
  monitoring:
    enabled: true
    prometheus: true
    grafana: true
    
  # Security
  security:
    tls_enabled: false
    network_policies: false
    pod_security_policies: false
    
  # Feature flags
  features:
    registration: true
    ssh_access: true
    web_interface: true
    api_access: true
    ttyrec_recording: true
    game_spectating: true
    
  # Development tools
  dev_tools:
    hot_reload: true
    debug_endpoints: true
    test_data: true
    mock_services: false
