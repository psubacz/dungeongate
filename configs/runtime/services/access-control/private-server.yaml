# Private Server Configuration
# Requires preloaded keys with specific usernames - invite only

server_access:
  mode: private
  
  private:
    require_preloaded_key: true
    max_users: 20
    max_anonymous_users: 0
    allow_key_reuse: false
    
key_management:
  preloaded_keys:
    enabled: true
    allow_expiration: true
    default_role: "user"
    require_unique_username: true
    
registration:
  required_fields:
    username: true
    email: true
    password: true
    access_key: true
    
  username:
    min_length: 3
    max_length: 32
    allowed_chars: "alphanumeric_underscore"
    reserved_names: ["admin", "root", "system", "anonymous", "guest"]
    
  password:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    
  email:
    required: true
    verify_on_signup: true
    allow_disposable: false
    
rate_limiting:
  registration_attempts:
    max_per_ip: 2
    window: "1h"
    
  login_attempts:
    max_per_ip: 5
    window: "1h"
    
  key_validation_attempts:
    max_per_ip: 3
    window: "1h"
    
security:
  ip_restrictions:
    enabled: true
    whitelist: []
    blacklist: []
    
  geo_restrictions:
    enabled: false
    allowed_countries: []
    blocked_countries: []
    
logging:
  log_access_attempts: true
  log_key_usage: true
  log_failed_registrations: true
  log_ip_addresses: true
  
monitoring:
  alert_on_failed_attempts: true
  alert_threshold: 3
  alert_window: "1h"
  
database:
  tables:
    invite_keys: "invite_keys"
    preloaded_keys: "preloaded_keys"
    access_logs: "access_logs"
    
  cleanup:
    expired_keys: "24h"
    old_logs: "168h"
