# Semi-Public Server Configuration
# Requires invitation keys to register, but allows some public access

server_access:
  mode: semi-public
  
  semi_public:
    require_invite_key: true
    max_users: 50
    max_anonymous_users: 10
    invite_key_expiration: "168h" # 7 days
    allow_self_signup: false
    
key_management:
  invite_keys:
    enabled: true
    default_expiration: "168h" # 7 days
    max_uses_per_key: 1
    allow_custom_expiration: true
    require_admin_approval: false
    
registration:
  required_fields:
    username: true
    email: true
    password: true
    invite_key: true
    
  username:
    min_length: 3
    max_length: 32
    allowed_chars: "alphanumeric_underscore"
    reserved_names: ["admin", "root", "system", "anonymous", "guest"]
    
  password:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: false
    
  email:
    required: true
    verify_on_signup: true
    allow_disposable: false
    
rate_limiting:
  registration_attempts:
    max_per_ip: 3
    window: "1h"
    
  login_attempts:
    max_per_ip: 10
    window: "1h"
    
  key_validation_attempts:
    max_per_ip: 3
    window: "1h"
    
security:
  ip_restrictions:
    enabled: false
    
logging:
  log_access_attempts: true
  log_key_usage: true
  log_failed_registrations: true
  log_ip_addresses: true
  
monitoring:
  alert_on_failed_attempts: true
  alert_threshold: 5
  alert_window: "1h"
