# Air configuration for hot reload during development

root = "."
testdata_dir = "test-data"
tmp_dir = "tmp"

[build]
  args_bin = ["-config", "configs/development/local.yaml"]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/session-service"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "test-data", "build", "docs"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_root = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true